<!DOCTYPE html>
<html lang="en" class="light">
<head>
	<!-- Resolve the theme before first paint so 'auto' (the default) doesn't flash
	     the wrong scheme on a dark-OS load. The Svelte app re-applies + live-tracks
	     after mount; this just sets the right class up front. -->
	<script>
		(function () {
			try {
				var m = localStorage.getItem('playground-theme');
				if (m !== 'light' && m !== 'dark' && m !== 'auto') m = 'auto';
				var dark = m === 'dark' || (m === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
				document.documentElement.className = dark ? 'dark' : 'light';
			} catch (e) {
				/* localStorage/matchMedia unavailable → keep the html default class */
			}
		})();
	</script>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css" />
	<title>tinkerscope</title>
	%sveltekit.head%
</head>
<body data-sveltekit-prerender="false">
	<div style="display: contents">%sveltekit.body%</div>
</body>
</html>
